<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Work Hours Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/date-fns/3.6.0/date-fns.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #F4C430;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      padding: 80px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -0.5px;
      margin-bottom: 40px;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin-bottom: 32px;
      padding: 20px 24px;
      background: #fafafa;
      border-radius: 12px;
      border: 1px solid #eee;
    }

    .controls label {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 4px;
    }

    .controls input[type="date"] {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: #333;
      background: #fff;
    }

    .controls input[type="date"]:focus {
      outline: none;
      border-color: #6B46C1;
      box-shadow: 0 0 0 3px rgba(107,70,193,0.1);
    }

    .controls .spacer {
      flex: 1;
    }

    /* Header Row */
    .project-header {
      display: grid;
      grid-template-columns: 200px 1fr 1fr 1fr;
      gap: 12px;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 16px;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .project-header span { display: flex; align-items: center; gap: 6px; }
    .project-header .value { font-weight: 400; color: #333; text-transform: none; letter-spacing: 0; }

    /* Table wrapper */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 0;
    }

    .table-wrap::-webkit-scrollbar { height: 6px; }
    .table-wrap::-webkit-scrollbar-track { background: #f5f5f5; border-radius: 3px; }
    .table-wrap::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 3px;
      min-width: 900px;
    }

    thead th {
      font-size: 11px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 6px;
      text-align: center;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 2;
    }

    thead th.name-col {
      text-align: left;
      width: 200px;
      min-width: 200px;
      position: sticky;
      left: 0;
      z-index: 3;
      background: #fff;
    }

    thead th.bar-col {
      text-align: right;
      width: 160px;
      min-width: 160px;
    }

    thead th.week-label {
      background: #fafafa;
      border-bottom: 2px solid #e8e8e8;
      padding: 10px 6px 6px;
      font-size: 10px;
      color: #999;
    }

    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: #fafafa; }

    tbody td {
      padding: 6px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      transition: all 0.15s;
    }

    tbody td.name-cell {
      text-align: left;
      color: #888;
      font-weight: 400;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 6px 10px 6px 6px;
      position: sticky;
      left: 0;
      background: #fff;
      z-index: 1;
    }
    tbody tr:hover td.name-cell { background: #fafafa; }

    .cell-empty {
      background: #f5f5f5;
      color: transparent;
    }

    .cell-filled {
      color: #fff;
      font-weight: 600;
    }

    .cell-filled:hover {
      transform: scale(1.08);
      box-shadow: 0 2px 8px rgba(107,70,193,0.3);
      cursor: default;
    }

    /* Summary bar column */
    td.bar-cell {
      padding: 4px 0 4px 8px;
      text-align: right;
      position: sticky;
      right: 0;
      background: #fff;
      z-index: 1;
    }
    tbody tr:hover td.bar-cell { background: #fafafa; }

    .bar-wrapper {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-height: 28px;
    }

    .bar-label {
      font-size: 12px;
      font-weight: 700;
      color: #333;
      white-space: nowrap;
      min-width: 55px;
      text-align: right;
    }

    .bar-track {
      width: 100px;
      height: 20px;
      background: #f0edf8;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .bar-fill {
      height: 100%;
      background: #6B46C1;
      border-radius: 10px;
      transition: width 0.4s ease;
      min-width: 0;
    }

    /* Footer */
    .footer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }

    .btn-pdf {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: #d9467a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-pdf:hover { background: #be3470; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(217,70,122,0.3); }
    .btn-pdf:active { transform: translateY(0); }
    .btn-pdf:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-pdf svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .credit {
      font-size: 12px;
      color: #999;
      text-align: right;
      line-height: 1.5;
    }
    .credit a {
      color: #6B46C1;
      text-decoration: none;
      font-weight: 600;
    }
    .credit a:hover { text-decoration: underline; }

    /* Print / PDF overrides */
    @media print {
      body { background: #fff !important; padding: 0; }
      .card { padding: 40px; box-shadow: none; border-radius: 0; }
      .btn-pdf { display: none !important; }
      .controls { display: none !important; }
      .bar-fill { background: #6B46C1 !important; }
      .cell-filled { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .bar-track { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .bar-fill { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      table { min-width: auto; }
    }

    /* Responsive: mobile < 768px */
    @media (max-width: 767px) {
      body { padding: 16px; align-items: flex-start; }
      .card { padding: 24px; border-radius: 16px; }
      h1 { font-size: 22px; margin-bottom: 24px; }
      .controls { flex-direction: column; align-items: stretch; gap: 10px; padding: 16px; }
      .controls .spacer { display: none; }
      .project-header {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        font-size: 11px;
        padding: 12px 16px;
      }
      .footer { flex-direction: column; text-align: center; }
      .btn-pdf { width: 100%; justify-content: center; }
      .credit { text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="dashboard-card">
      <h1>Visualize Your Team&rsquo;s Work Hours</h1>

      <!-- Controls -->
      <div class="controls" id="controls">
        <label for="project-input">Project</label>
        <input type="text" id="project-input" value="Project A" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;color:#333;" />
        <label for="date-start">Start</label>
        <input type="date" id="date-start" />
        <label for="date-end">End</label>
        <input type="date" id="date-end" />
        <span class="spacer"></span>
        <button id="btn-update" style="padding:8px 20px;background:#6B46C1;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;">Update</button>
      </div>

      <!-- Project Info Header -->
      <div class="project-header" id="project-header">
        <span>Project <span class="value" id="header-project">Project A</span></span>
        <span>Date Range Start <span class="value" id="header-start">—</span></span>
        <span>Date Range End <span class="value" id="header-end">—</span></span>
        <span>Date Level <span class="value">Default</span></span>
      </div>

      <!-- Table -->
      <div class="table-wrap" id="table-wrap">
        <table id="hours-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <!-- Footer -->
      <div class="footer">
        <button class="btn-pdf" id="btn-pdf">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Download PDF
        </button>
        <div class="credit">
          Created by: <a href="https://github.com/imagineazhar" target="_blank">@imagineazhar</a> | WorkOutWednesday | Week 30
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ─── Sample Data ─── */
    const SAMPLE_DATA = {
      project: "Project A",
      dateStart: "2022-07-11",
      dateEnd: "2022-07-24",
      team: [
        { name: "Elizabeth Moffitt",   hours: [10.75, 3.17, 3.83, 5.83, 7.08, 0,    5.25, 4.75, 1.17, 7.08, 6.08, 0,    0,    0] },
        { name: "Angela Bowers",       hours: [8.5,   0,    4.5,   6.25, 0,    2.5,  4.33, 7.75, 0,    5.5,   3.17, 0,    2.17, 6.08] },
        { name: "Judy Mosley",         hours: [0,     7.5,   5.83, 0,    6.17, 3.33, 0,    6.5,   4.17, 0,    7.83, 1.5,  0,    5.25] },
        { name: "Leah Stevenson",      hours: [6.08,  4.33,  0,    8.5,   0,    3.67, 5.5,   0,    7.08, 3.17,  0,    6.75, 2.33, 0] },
        { name: "Kelli Anderson",      hours: [4.17,  0,    7.08,  3.5,   5.83, 0,    6.75, 2.17,  0,    8.5,   4.33, 0,    5.5,  3.17] },
        { name: "Joshua Taylor",       hours: [0,     5.25,  0,    6.75,  4.5,  2.08, 0,    5.83,  3.17, 0,    6.5,   4.17, 0,    7.08] },
        { name: "Maria Sanchez",       hours: [7.5,   2.17,  5.5,   0,    3.33, 6.08, 0,    4.5,   5.83, 2.17,  0,    7.75, 3.5,  0] },
        { name: "David Chen",          hours: [3.83,  6.5,   0,    4.17,  7.08, 0,    5.25, 3.33,  6.75, 0,    4.5,   5.83, 2.08, 6.17] },
        { name: "Sarah Williams",      hours: [5.25,  0,    6.75,  3.17,  0,    7.5,  4.33, 0,    5.5,   6.08, 3.17,  0,    7.08, 4.75] },
        { name: "James Thompson",      hours: [0,     4.5,   3.17,  7.08,  5.83, 0,    6.08, 2.17,  0,    4.33,  7.5,  3.83, 0,    5.25] },
        { name: "Emily Rodriguez",     hours: [6.75,  3.83,  0,    5.5,   2.17, 4.33, 0,    7.08, 3.5,   5.83, 0,    6.17, 4.5,  2.08] },
        { name: "Michael Brown",       hours: [4.33,  0,    6.08,  2.5,   7.75, 3.17, 0,    4.17, 6.5,   2.08, 5.83, 0,    3.33, 7.08] },
      ]
    };

    let currentData = JSON.parse(JSON.stringify(SAMPLE_DATA));

    /* ─── Helpers ─── */
    function fmtHours(decimal) {
      if (decimal == null || decimal === 0) return null;
      const h = Math.floor(decimal);
      const m = Math.round((decimal - h) * 60);
      return `${h}h ${m.toString().padStart(2, '0')}m`;
    }

    function fmtHoursShort(decimal) {
      if (decimal == null || decimal === 0) return '0h 0';
      const h = Math.floor(decimal);
      const m = Math.round((decimal - h) * 60);
      return `${h}h ${m}`;
    }

    function intensityColor(hours, maxHours) {
      if (!hours || hours === 0) return null;
      const ratio = Math.min(hours / (maxHours || 1), 1);
      const lightness = 38 - (ratio * 16);
      const saturation = 40 + (ratio * 30);
      return `hsl(260, ${saturation}%, ${lightness}%)`;
    }

    function getDatesBetween(startStr, endStr) {
      const start = dateFns.parseISO(startStr);
      const end = dateFns.parseISO(endStr);
      const dates = [];
      let cur = start;
      while (!dateFns.isAfter(cur, end)) {
        dates.push(new Date(cur));
        cur = dateFns.addDays(cur, 1);
      }
      return dates;
    }

    function parseDateInputs() {
      return {
        project: document.getElementById('project-input').value || 'Project',
        start: document.getElementById('date-start').value,
        end: document.getElementById('date-end').value,
      };
    }

    /* ─── Render ─── */
    function render(data) {
      const dates = getDatesBetween(data.dateStart, data.dateEnd);
      const dayLabels = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];
      const totalDays = dates.length;

      // Build week-grouped headers
      let weeks = [];
      let currentWeek = [];
      dates.forEach((d, i) => {
        currentWeek.push(d);
        if (d.getDay() === 0 || i === dates.length - 1) {
          weeks.push(currentWeek);
          currentWeek = [];
        }
      });

      // Find max hours for intensity scaling
      let maxHours = 0;
      data.team.forEach(m => {
        m.hours.forEach(h => { if (h > maxHours) maxHours = h; });
      });

      // Render thead
      const thead = document.getElementById('table-head');
      let headHtml = '<tr><th class="name-col">Team Member</th>';
      weeks.forEach(week => {
        const weekStart = week[0];
        const weekEnd = week[week.length - 1];
        const label = dateFns.format(weekStart, 'MMM d') + ' - ' + dateFns.format(weekEnd, 'MMM d');
        headHtml += `<th class="week-label" colspan="${week.length}">${label}</th>`;
      });
      headHtml += '<th class="bar-col">Total Hours</th></tr><tr>';
      headHtml += '<th class="name-col"></th>';
      dates.forEach(d => {
        const dayName = dayLabels[d.getDay()];
        const dayNum = dateFns.format(d, 'd');
        headHtml += `<th>${dayName}<br><span style="font-weight:400;color:#999;font-size:10px;">${dayNum}</span></th>`;
      });
      headHtml += '<th class="bar-col"></th></tr>';
      thead.innerHTML = headHtml;

      // Render tbody
      const tbody = document.getElementById('table-body');
      let bodyHtml = '';
      data.team.forEach((member, rowIdx) => {
        const total = member.hours.reduce((s, h) => s + (h || 0), 0);
        const maxBar = 120;
        const barWidth = total > 0 ? Math.min((total / 84) * maxBar, maxBar) : 0;

        bodyHtml += '<tr>';
        // Name
        bodyHtml += `<td class="name-cell">${member.name}</td>`;
        // Day cells
        for (let i = 0; i < totalDays; i++) {
          const h = i < member.hours.length ? member.hours[i] : 0;
          if (h && h > 0) {
            const color = intensityColor(h, maxHours);
            bodyHtml += `<td class="cell-filled" style="background:${color};">${fmtHours(h)}</td>`;
          } else {
            bodyHtml += `<td class="cell-empty">—</td>`;
          }
        }
        // Bar cell
        bodyHtml += `<td class="bar-cell">
          <div class="bar-wrapper">
            <span class="bar-label">${fmtHoursShort(total)}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${barWidth}px;"></div></div>
          </div>
        </td>`;
        bodyHtml += '</tr>';
      });
      tbody.innerHTML = bodyHtml;

      // Update header info
      document.getElementById('header-project').textContent = data.project;
      document.getElementById('header-start').textContent = data.dateStart ? dateFns.format(dateFns.parseISO(data.dateStart), 'M/d/yyyy') : '—';
      document.getElementById('header-end').textContent = data.dateEnd ? dateFns.format(dateFns.parseISO(data.dateEnd), 'M/d/yyyy') : '—';
    }

    /* ─── PDF Export ─── */
    document.getElementById('btn-pdf').addEventListener('click', function () {
      const btn = this;
      btn.disabled = true;
      btn.textContent = 'Generating PDF…';

      const element = document.getElementById('dashboard-card');
      const opt = {
        margin:       [0.4, 0.4, 0.4, 0.4],
        filename:     `team-hours-${currentData.project.replace(/\s+/g, '-')}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
        jsPDF:        { unit: 'in', format: 'a3', orientation: 'landscape' },
      };
      html2pdf().set(opt).from(element).save().then(() => {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Download PDF`;
      }).catch(() => {
        btn.disabled = false;
        btn.textContent = 'Download PDF';
        alert('PDF generation failed. Try again.');
      });
    });

    /* ─── Update ─── */
    document.getElementById('btn-update').addEventListener('click', () => {
      const inputs = parseDateInputs();
      if (!inputs.start || !inputs.end) {
        alert('Please select both start and end dates.');
        return;
      }
      currentData.project = inputs.project;
      currentData.dateStart = inputs.start;
      currentData.dateEnd = inputs.end;
      render(currentData);
    });

    /* ─── Init ─── */
    function init() {
      document.getElementById('date-start').value = SAMPLE_DATA.dateStart;
      document.getElementById('date-end').value = SAMPLE_DATA.dateEnd;
      render(SAMPLE_DATA);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
